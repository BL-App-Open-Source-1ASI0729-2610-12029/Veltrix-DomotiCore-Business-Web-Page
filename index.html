<!-- ── PREVIEW ── -->
<section class="preview" id="plataforma">
  <div class="container">

    <div class="section-tag" data-i18n="preview.tag"></div>

    <h2 class="section-title" data-i18n="preview.title"></h2>

    <p class="section-sub" data-i18n="preview.sub"></p>

    <div class="preview-box">

      <div class="preview-bar">
        <div class="dot d-r"></div>
        <div class="dot d-y"></div>
        <div class="dot d-g"></div>

        <div class="preview-url">
          domoticore.veltrix.pe/dashboard
        </div>
      </div>

      <div class="preview-inner">

        <div class="sidebar">
          <div class="sb-label" data-i18n="dash.general"></div>

          <div class="sb-item active">
            <div class="sb-dot"></div>
            <span data-i18n="dash.dashboard"></span>
          </div>

          <div class="sb-item">
            <div class="sb-dot"></div>
            <span data-i18n="dash.devices"></span>
          </div>

          <div class="sb-item">
            <div class="sb-dot"></div>
            <span data-i18n="dash.automations"></span>
          </div>

          <div class="sb-label" data-i18n="dash.analysis"></div>

          <div class="sb-item">
            <div class="sb-dot"></div>
            <span data-i18n="dash.energy"></span>
          </div>

          <div class="sb-item">
            <div class="sb-dot"></div>
            <span data-i18n="dash.alerts"></span>
          </div>

          <div class="sb-item">
            <div class="sb-dot"></div>
            <span data-i18n="dash.reports"></span>
          </div>

          <div class="sb-label" data-i18n="dash.config"></div>

          <div class="sb-item">
            <div class="sb-dot"></div>
            <span data-i18n="dash.users"></span>
          </div>
        </div>

        <div class="dash-main">

          <div class="dash-cards">

            <div class="dc dc-green">
              <div class="dc-lbl" data-i18n="dash.card1.lbl"></div>
              <div class="dc-val">12</div>
            </div>

            <div class="dc">
              <div class="dc-lbl" data-i18n="dash.card2.lbl"></div>
              <div class="dc-val">5</div>
            </div>

            <div class="dc dc-amber">
              <div class="dc-lbl" data-i18n="dash.card3.lbl"></div>
              <div class="dc-val">3.4 kW</div>
            </div>

            <div class="dc dc-red">
              <div class="dc-lbl" data-i18n="dash.card4.lbl"></div>
              <div class="dc-val">2</div>
            </div>

          </div>

          <div class="device-list">

            <div class="dev-row">
              <div class="dev-name">
                <img src="" alt="Luz" class="device-icon">
                <span data-i18n="dash.dev1"></span>
                <span class="dev-badge on" data-i18n="dash.online"></span>
              </div>

              <button class="toggle ton"></button>
            </div>

            <div class="dev-row">
              <div class="dev-name">
                <img src="" alt="Monitor" class="device-icon">
                <span data-i18n="dash.dev2"></span>
                <span class="dev-badge on" data-i18n="dash.online"></span>
              </div>

              <button class="toggle ton"></button>
            </div>

            <div class="dev-row">
              <div class="dev-name">
                <img src="" alt="Aire" class="device-icon">
                <span data-i18n="dash.dev3"></span>
                <span class="dev-badge off" data-i18n="dash.offline"></span>
              </div>

              <button class="toggle toff"></button>
            </div>

            <div class="dev-row">
              <div class="dev-name">
                <img src="" alt="Luz" class="device-icon">
                <span data-i18n="dash.dev4"></span>
                <span class="dev-badge on" data-i18n="dash.online"></span>
              </div>

              <button class="toggle ton"></button>
            </div>

          </div>
        </div>
      </div>

</section>

<!-- ── CONTACTO ── -->
<section class="contact" id="contacto">
  <div class="container">

    <div class="contact-wrap">

      <div>

        <div class="section-tag" data-i18n="contact.tag"></div>

        <h2 class="section-title" data-i18n="contact.title"></h2>

        <p class="section-sub" data-i18n="contact.sub"></p>

        <div class="contact-info">

          <div class="info-item">
            <div class="info-icon">📍</div>

            <div>
              <div class="info-label" data-i18n="contact.locLabel"></div>
              <div class="info-val" data-i18n="contact.locVal"></div>
            </div>
          </div>

          <div class="info-item">
            <div class="info-icon">✉️</div>

            <div>
              <div class="info-label" data-i18n="contact.emailLabel"></div>
              <div class="info-val">hola@veltrix.pe</div>
            </div>
          </div>

          <div class="info-item">
            <div class="info-icon">📱</div>

            <div>
              <div class="info-label" data-i18n="contact.waLabel"></div>
              <div class="info-val">+51 999 123 456</div>
            </div>
          </div>

        </div>
      </div>

      <div>

        <div class="contact-form">

          <div class="form-row">

            <div class="form-group">
              <label data-i18n="contact.form.name"></label>
              <input type="text" id="fn" data-i18n-placeholder="contact.form.namePh" />
            </div>

            <div class="form-group">
              <label data-i18n="contact.form.email"></label>
              <input type="email" id="fe" placeholder="tu@correo.com" />
            </div>

          </div>

          <div class="form-group">
            <label data-i18n="contact.form.type"></label>

            <select id="fs">
              <option value="" data-i18n="contact.form.typeOpt0"></option>
              <option data-i18n="contact.form.typeOpt1"></option>
              <option data-i18n="contact.form.typeOpt2"></option>
              <option data-i18n="contact.form.typeOpt3"></option>
              <option data-i18n="contact.form.typeOpt4"></option>
            </select>
          </div>

          <div class="form-group">
            <label data-i18n="contact.form.msg"></label>
            <textarea id="fm" data-i18n-placeholder="contact.form.msgPh"></textarea>
          </div>

          <button class="submit-btn" onclick="sendForm()" data-i18n="contact.form.submit"></button>

          <div class="success-msg" id="smsg" data-i18n="contact.form.success"></div>

        </div>
      </div>
    </div>
  </div>
</section>
